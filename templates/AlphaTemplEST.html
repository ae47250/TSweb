<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{document.title}}</title>
  <link rel="stylesheet" href="./style_updated.css" />
</head>
<body>
  <main class="estimate">
    <header>
      <h1>Alpha Tree Service</h1>
      <p>{{document.number}} | {{document.date_display}}</p>
    </header>
    <section>
      <h2>Customer</h2>
      <p>{{customer.name}}</p>
      <p>{{customer.phone_display}}</p>
    </section>
    <section>
      <h2>Service Address</h2>
      <p>{{job.service_address.display}}</p>
    </section>
    <section>
      <h2>Work</h2>
      <p>{{job.description}}</p>
    </section>
    <section>
      <h2>Options</h2>
      {{service_options_html}}
    </section>
    <section>
      <h2>Authorization</h2>
      <p class="legal-disclaimer">{{legal_disclaimer}}</p>
    </section>
  </main>
</body>
</html>
